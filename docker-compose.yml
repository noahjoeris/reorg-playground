services:
  bitcoind-regtest-a:
    image: bitcoin/bitcoin:latest
    restart: unless-stopped
    command:
      - -regtest
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=reorg-playground
      - -rpcpassword=reorg-playground
      - -rpcport=18443
      - -port=18444
      - -addnode=bitcoind-regtest-b:18444
      - -datadir=/home/bitcoin/.bitcoin
    volumes:
      - bitcoind_regtest_a_data:/home/bitcoin/.bitcoin
    healthcheck:
      test:
        - CMD
        - bitcoin-cli
        - -regtest
        - -rpcconnect=127.0.0.1
        - -rpcport=18443
        - -rpcuser=reorg-playground
        - -rpcpassword=reorg-playground
        - getblockchaininfo
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  bitcoind-regtest-b:
    image: bitcoin/bitcoin:latest
    restart: unless-stopped
    command:
      - -regtest
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=reorg-playground
      - -rpcpassword=reorg-playground
      - -rpcport=18443
      - -port=18444
      - -datadir=/home/bitcoin/.bitcoin
    volumes:
      - bitcoind_regtest_b_data:/home/bitcoin/.bitcoin
    healthcheck:
      test:
        - CMD
        - bitcoin-cli
        - -regtest
        - -rpcconnect=127.0.0.1
        - -rpcport=18443
        - -rpcuser=reorg-playground
        - -rpcpassword=reorg-playground
        - getblockchaininfo
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  bitcoind-signet-a:
    image: bitcoin/bitcoin:latest
    restart: unless-stopped
    command:
      - -signet
      - -signetchallenge=51
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=reorg-playground
      - -rpcpassword=reorg-playground
      - -rpcport=38332
      - -port=38333
      - -dnsseed=0
      - -fixedseeds=0
      - -addnode=bitcoind-signet-b:38333
      - -datadir=/home/bitcoin/.bitcoin
    volumes:
      - bitcoind_signet_a_data:/home/bitcoin/.bitcoin
    healthcheck:
      test:
        - CMD
        - bitcoin-cli
        - -signet
        - -signetchallenge=51
        - -rpcconnect=127.0.0.1
        - -rpcport=38332
        - -rpcuser=reorg-playground
        - -rpcpassword=reorg-playground
        - getblockchaininfo
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  bitcoind-signet-b:
    image: bitcoin/bitcoin:latest
    restart: unless-stopped
    command:
      - -signet
      - -signetchallenge=51
      - -server=1
      - -rpcbind=0.0.0.0
      - -rpcallowip=0.0.0.0/0
      - -rpcuser=reorg-playground
      - -rpcpassword=reorg-playground
      - -rpcport=38332
      - -port=38333
      - -dnsseed=0
      - -fixedseeds=0
      - -datadir=/home/bitcoin/.bitcoin
    volumes:
      - bitcoind_signet_b_data:/home/bitcoin/.bitcoin
    healthcheck:
      test:
        - CMD
        - bitcoin-cli
        - -signet
        - -signetchallenge=51
        - -rpcconnect=127.0.0.1
        - -rpcport=38332
        - -rpcuser=reorg-playground
        - -rpcpassword=reorg-playground
        - getblockchaininfo
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  signet-miner:
    image: bitcoin/bitcoin:latest
    profiles:
      - tools
    restart: "no"
    depends_on:
      bitcoind-signet-a:
        condition: service_healthy
      bitcoind-signet-b:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - /scripts/run-signet-miner.sh
    environment:
      SIGNET_CHALLENGE: "51"
      SIGNET_RPC_USER: reorg-playground
      SIGNET_RPC_PASSWORD: reorg-playground
      SIGNET_NODE_A_RPC_HOST: bitcoind-signet-a
      SIGNET_NODE_A_RPC_PORT: "38332"
      SIGNET_NODE_B_RPC_HOST: bitcoind-signet-b
      SIGNET_NODE_B_RPC_PORT: "38332"
      SIGNET_MAX_TRIES: "200000000"
    volumes:
      - ./scripts:/scripts:ro

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      bitcoind-regtest-a:
        condition: service_healthy
      bitcoind-regtest-b:
        condition: service_healthy
      bitcoind-signet-a:
        condition: service_healthy
      bitcoind-signet-b:
        condition: service_healthy
    environment:
      CONFIG_FILE: /app/config/config.toml
      RUST_LOG: info
    expose:
      - "2323"
    volumes:
      - app_db:/data
      - ./config.docker.toml:/app/config/config.toml:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  app_db:
  bitcoind_regtest_a_data:
  bitcoind_regtest_b_data:
  bitcoind_signet_a_data:
  bitcoind_signet_b_data:
