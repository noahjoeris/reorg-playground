# reorg-playground docker configuration (mainnet/testnet/regtest/custom signet)

database_path = "/data/reorg.db"
address = "0.0.0.0:2323"
rss_base_url = ""

[[networks]]
id = 0
name = "Mainnet"
description = "Bitcoin Mainnet"
query_interval = 15
first_tracked_height = 937000
visible_heights_from_tip = 500
extra_hotspot_heights = 100
network_type = "Mainnet"
disable_node_controls = false # Only affects node controls on Regtest/custom Signet.

    [[networks.nodes]]
    id = 0
    name = "PublicNode"
    description = "PublicNode Bitcoin RPC node"
    rpc_host = "https://bitcoin-rpc.publicnode.com"
    rpc_port = 443
    rpc_user = ""
    rpc_password = ""
    use_rest = false
    client_implementation = "bitcoincore"

